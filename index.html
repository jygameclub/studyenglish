<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 英语口语助手 - 旗舰版</title>
    <link rel="icon" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pb-20">

<div class="max-w-2xl mx-auto px-4 py-6">
    <!-- Header -->
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <button onclick="toggleTheme()" class="theme-card p-2 shadow-sm flex items-center justify-center hover:opacity-80 transition-all">
                <i data-lucide="sun" id="themeIcon" class="w-5 h-5 theme-primary-text"></i>
            </button>
            <div>
                <h1 class="text-xl font-bold theme-primary-text tracking-tight">口语助手 AI</h1>
                <p class="theme-text-muted text-[10px] font-black uppercase tracking-widest">Master Your English</p>
            </div>
        </div>
        <div id="statusBadge" class="flex items-center gap-2 px-3 py-1 theme-card text-[10px] font-bold theme-text-muted uppercase">
            <span id="statusIndicator" class="w-2 h-2 rounded-full bg-green-500"></span>
            <span id="statusText">系统就绪</span>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="flex space-x-1 tab-nav p-1 mb-6 shadow-inner border theme-border">
        <button onclick="switchTab('study')" id="tab-study" class="tab-btn tab-btn-active flex-1 flex items-center justify-center gap-2 py-2.5 text-xs theme-radius transition-all">
            <i data-lucide="book-open" class="w-4 h-4"></i> 练习
        </button>
        <button onclick="switchTab('manage')" id="tab-manage" class="tab-btn flex-1 flex items-center justify-center gap-2 py-2.5 text-xs theme-radius transition-all">
            <i data-lucide="list-plus" class="w-4 h-4"></i> 词库
        </button>
        <button onclick="switchTab('settings')" id="tab-settings" class="tab-btn flex-1 flex items-center justify-center gap-2 py-2.5 text-xs theme-radius transition-all">
            <i data-lucide="settings" class="w-4 h-4"></i> 设置
        </button>
    </nav>

    <!-- Tab 1: Study Mode -->
    <div id="content-study" class="tab-content active space-y-4">
        <div class="theme-card p-4 shadow-sm sticky top-4 z-10 space-y-4">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 theme-text-muted"></i>
                    <input type="text" id="searchInput" oninput="filterPhrases()" placeholder="搜索关键词..." class="w-full pl-10 pr-4 py-2 text-sm bg-black/5 dark:bg-white/5 border-none theme-radius theme-text-main outline-none focus:ring-1 focus:ring-current">
                </div>
                <button onclick="toggleBlur()" id="blurToggleBtn" class="px-4 py-2 text-[10px] font-black uppercase bg-amber-500/10 text-amber-600 dark:text-amber-400 theme-radius border border-amber-500/20 flex items-center gap-2">
                    <i data-lucide="eye-off" class="w-3 h-3"></i> <span>隐藏中文</span>
                </button>
            </div>

            <!-- 类型筛选 Chip 条 -->
            <div id="categoryChips" class="flex gap-2 overflow-x-auto no-scrollbar py-1"></div>

            <div class="flex gap-2 pt-1">
                <button id="playBtn" onclick="toggleAutoPlay()" class="flex-1 theme-primary-bg text-white text-xs font-black py-3 theme-radius flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95">
                    <i data-lucide="play" id="playIcon" class="w-4 h-4"></i> <span id="playText">顺序循环播放</span>
                </button>
                <button onclick="stopAll()" class="px-4 bg-black/5 dark:bg-white/5 theme-text-muted theme-radius border border-transparent hover:theme-border">
                    <i data-lucide="square" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
        <div id="studyList" class="space-y-4 pt-2"></div>
    </div>

    <!-- Tab 2: Manage -->
    <div id="content-manage" class="tab-content space-y-6">
        <div class="theme-card p-6 shadow-sm space-y-4">
             <h3 class="text-xs font-black uppercase theme-text-muted tracking-widest">快速导入句子</h3>
             <textarea id="newEn" placeholder="英文内容..." class="w-full p-3 theme-radius bg-black/5 dark:bg-white/5 border theme-border text-sm min-h-[80px] theme-text-main outline-none"></textarea>
             <input type="text" id="newCn" placeholder="中文翻译 (留空则尝试 AI 生成)..." class="w-full p-3 theme-radius bg-black/5 dark:bg-white/5 border theme-border text-sm theme-text-main outline-none">
             <div class="flex gap-2">
                <select id="newType" class="flex-1 p-2 bg-black/5 dark:bg-white/5 border border-transparent theme-radius text-xs theme-text-main outline-none focus:theme-border"></select>
                <button onclick="addPhrase()" class="px-6 theme-primary-bg text-white theme-radius text-xs font-black">添加</button>
             </div>
        </div>
        <div class="flex justify-between items-center px-2">
            <h3 class="text-[10px] font-black theme-text-muted uppercase tracking-widest">词库列表 (<span id="manageCount">0</span>)</h3>
            <div class="flex gap-2">
                <button onclick="exportData()" class="px-3 py-1.5 theme-card text-[10px] font-bold theme-text-muted uppercase">导出</button>
                <button onclick="importData()" class="px-3 py-1.5 theme-card text-[10px] font-bold theme-text-muted uppercase">导入</button>
            </div>
        </div>
        <div id="manageList" class="space-y-2"></div>
    </div>

    <!-- Tab 3: Settings -->
    <div id="content-settings" class="tab-content space-y-6">
        <div class="theme-card p-6 shadow-sm space-y-8">
            <!-- AI 设置 -->
            <section class="space-y-4">
                <h3 class="text-xs font-black uppercase theme-text-muted tracking-widest flex items-center gap-2">
                    <i data-lucide="brain" class="w-4 h-4"></i> AI 核心设置 (Gemini)
                </h3>
                <input type="password" id="apiKeyInput" onchange="saveApiKey()" placeholder="输入 Gemini API Key..." class="w-full p-3 theme-radius bg-black/5 dark:bg-white/5 border theme-border text-xs theme-text-main outline-none">
            </section>

            <!-- 语音设置 -->
            <section class="space-y-4 pt-6 border-t theme-border">
                <h3 class="text-xs font-black uppercase theme-text-muted tracking-widest flex items-center gap-2">
                    <i data-lucide="volume-2" class="w-4 h-4"></i> 语音设置
                </h3>
                <select id="voiceSelect" onchange="updateSettings()" class="w-full p-3 theme-radius bg-black/5 dark:bg-white/5 border theme-border text-xs theme-text-main outline-none">
                    <option>加载中...</option>
                </select>
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px] font-black theme-text-muted uppercase">
                        <label>语速</label><span id="rateVal" class="theme-primary-text">1</span>
                    </div>
                    <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="1" oninput="updateSettings()" class="w-full accent-current">
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px] font-black theme-text-muted uppercase">
                        <label>音调</label><span id="pitchVal" class="theme-primary-text">1</span>
                    </div>
                    <input type="range" id="pitchRange" min="0.5" max="2" step="0.1" value="1" oninput="updateSettings()" class="w-full accent-current">
                </div>
            </section>

            <!-- 风格选择 -->
            <section class="space-y-4 pt-6 border-t theme-border">
                <h3 class="text-xs font-black uppercase theme-text-muted tracking-widest">界面视觉风格</h3>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <button onclick="applyStyle('modern')" id="style-modern" class="p-3 theme-card text-[10px] font-black flex flex-col items-center gap-2 hover:theme-border bg-white text-slate-800">
                        <div class="w-6 h-6 rounded-full bg-indigo-500"></div> MODERN
                    </button>
                    <button onclick="applyStyle('github')" id="style-github" class="p-3 theme-card text-[10px] font-black flex flex-col items-center gap-2 hover:theme-border bg-white text-slate-800">
                        <div class="w-6 h-6 rounded-md bg-green-600"></div> GITHUB
                    </button>
                    <button onclick="applyStyle('retro')" id="style-retro" class="p-3 theme-card text-[10px] font-black flex flex-col items-center gap-2 hover:theme-border bg-black text-green-500">
                        <div class="w-6 h-6 border border-green-500"></div> RETRO
                    </button>
                    <button onclick="applyStyle('academic')" id="style-academic" class="p-3 theme-card text-[10px] font-black flex flex-col items-center gap-2 hover:theme-border bg-[#f4f1ea] text-black">
                        <div class="w-6 h-6 bg-black"></div> ACADEMIC
                    </button>
                    <button onclick="applyStyle('cyber')" id="style-cyber" class="p-3 theme-card text-[10px] font-black flex flex-col items-center gap-2 hover:theme-border bg-[#0d0221] text-cyan-400">
                        <div class="w-6 h-6 rounded-lg bg-pink-500"></div> CYBER
                    </button>
                </div>
            </section>

            <!-- 字体与排版 -->
            <section class="space-y-4 pt-6 border-t theme-border">
                <h3 class="text-xs font-black uppercase theme-text-muted tracking-widest">排版与自定义</h3>
                <select id="fontSelect" onchange="updateVisualSettings()" class="w-full p-3 theme-radius bg-black/5 dark:bg-white/5 border theme-border text-xs theme-text-main outline-none">
                    <option value="inherit">跟随风格预设</option>
                    <option value="'Inter', sans-serif">无衬线体 (Sans Serif)</option>
                    <option value="'Noto Serif SC', serif">衬线体 (Serif - 书卷感)</option>
                    <option value="'JetBrains Mono', monospace">等宽体 (Monospace - 极客感)</option>
                </select>
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px] font-black theme-text-muted uppercase">
                        <label>基础字号大小</label><span id="fontSizeVal" class="theme-primary-text">100%</span>
                    </div>
                    <input type="range" id="fontSizeRange" min="80" max="150" step="5" value="100" oninput="updateVisualSettings()" class="w-full accent-current">
                </div>
            </section>

            <button onclick="loadDefaultPhrases()" class="w-full bg-amber-500/10 text-amber-600 py-3 theme-radius text-[10px] font-black uppercase hover:bg-amber-500/20 transition-all">恢复默认短语库</button>
            <button onclick="clearData()" class="w-full bg-red-500/10 text-red-500 py-3 theme-radius text-[10px] font-black uppercase hover:bg-red-500/20 transition-all">重置所有系统数据</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="px-6 py-3 theme-card shadow-2xl theme-text-main text-xs font-black">
    <span id="toastMsg"></span>
</div>

<!-- AI Modal -->
<div id="aiModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="theme-card w-full max-w-lg p-6 shadow-2xl space-y-4">
        <div class="flex justify-between items-center">
            <h3 class="text-xs font-black uppercase theme-primary-text">AI 深度解析引擎</h3>
            <button onclick="closeAiModal()"><i data-lucide="x" class="w-5 h-5 theme-text-muted"></i></button>
        </div>
        <div id="aiContent" class="text-sm space-y-4 max-h-[60vh] overflow-y-auto pr-2 no-scrollbar theme-text-main font-medium"></div>
        <button onclick="closeAiModal()" class="w-full py-3 theme-primary-bg text-white theme-radius text-xs font-black uppercase">我明白了</button>
    </div>
</div>

<!-- Import Modal -->
<div id="importModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="theme-card w-full max-w-lg p-6 shadow-2xl space-y-4">
        <div class="flex justify-between items-center">
            <h3 class="text-xs font-black uppercase theme-primary-text flex items-center gap-2">
                <i data-lucide="download" class="w-4 h-4"></i> 导入数据
            </h3>
            <button onclick="closeImportModal()"><i data-lucide="x" class="w-5 h-5 theme-text-muted"></i></button>
        </div>

        <!-- 文件上传 -->
        <div class="import-option-btn p-4" onclick="document.getElementById('importFileInput').click()">
            <div class="flex items-center gap-3">
                <i data-lucide="upload" class="w-5 h-5 theme-primary-text"></i>
                <div>
                    <div class="text-sm font-bold theme-text-main">上传 JSON 文件</div>
                    <div class="text-[10px] theme-text-muted">选择之前导出的 .json 文件</div>
                </div>
            </div>
            <input type="file" id="importFileInput" class="hidden" accept=".json" onchange="handleImportFile(event)">
        </div>

        <div class="text-center text-[10px] theme-text-muted font-black uppercase tracking-widest">或者</div>

        <!-- 粘贴 JSON -->
        <textarea id="importJsonText" placeholder="粘贴 JSON 数据..." class="w-full p-3 theme-radius bg-black/5 dark:bg-white/5 border theme-border text-xs min-h-[120px] theme-text-main outline-none" style="font-family: 'JetBrains Mono', monospace;"></textarea>

        <div class="flex gap-2">
            <select id="importMode" class="flex-1 p-2 bg-black/5 dark:bg-white/5 border theme-border theme-radius text-xs theme-text-main outline-none">
                <option value="replace">替换现有数据</option>
                <option value="append">追加到现有数据</option>
            </select>
            <button onclick="processImport()" class="px-6 theme-primary-bg text-white theme-radius text-xs font-black">确认导入</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
